schema: spec-driven
context: |
  所有 artifact 创建完毕后（最后一个 artifact 写入后），MUST 执行端到端一致性校验，全部通过后才能宣布完成。
    - 校验方法（三维度交叉比对）：
      1) proposal → specs 覆盖：proposal 列出的每个改动项，都至少有 1 个 spec requirement 对应。proposal 未提及的改动不应出现在 specs 中。
      2) specs → tasks 覆盖：每个 spec requirement 都至少有 1 个 task 对应。task 涉及但 spec 未覆盖的改动应补充或说明理由。
      3) tasks → specs 对齐：每个 task 描述的目标文件/行为必须与对应 spec requirement 的 WHEN/THEN 断言一致。
      4) design → tasks 结构：design decisions 的每个选择都在 tasks 中体现（如 Chunk 划分、文件重命名 vs 删除）。
      5) Non-Goals 矛盾：检查 tasks 是否违反了 design.md Non-Goals 中声明的边界。
      6) task 编号/格式：编号连续无重复、每个 Chunk 以测试 task 结尾（纯文档 Chunk 除外）。
    - 校验结果以表格形式输出，列出 PASS/FAIL 每条 + 问题总数。有 FAIL 时必须修复后再宣布完成。
    - 校验不通过时，修复后必须重新运行校验，直到全部 PASS。
    - **生成todolist后, 在创建task.md后增加一个 "[ ] 进行artifact文档, 讨论结果的一致性检查"**

rules:
  tasks:
    - 每个功能模块的 task 必须遵循 TDD 流程，按此顺序生成子任务：
        1) RED：编写失败测试，定义接口契约与期望行为（覆盖正常/边界/极端/异常场景）
        2) GREEN：编写最小可用代码使测试通过
        3) REFACTOR：补充正常业务逻辑，保持测试全绿
        4) 循环以上步骤，每个行为点独立走一轮红绿重构
    - 测试 task 的描述必须明确列出需覆盖的场景类别，不允许笼统写"编写测试"。
    - tasks.md 的第一个 checkbox 必须是："- [ ] 确认 test-driven-development、dispatching-parallel-agents 技能已加载（未加载则加载，已加载则跳过）"