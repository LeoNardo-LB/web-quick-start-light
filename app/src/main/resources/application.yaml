spring:
  application:
    name: ${rootArtifactId}
  profiles:
    active: ${symbol_dollar}{SPRING_PROFILES_ACTIVE:dev}
  mvc:
    apiversion:
      default: "1.0"
      use:
        header: "API-Version"
  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 9201
  servlet:
    context-path: /${symbol_dollar}{spring.application.name}

springdoc:
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /openapi-doc.html

logging:
  config: classpath:logback-spring.xml

# Actuator 端点暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0

# App info (used by AppInfoProperties for startup banner)
app:
  port: ${symbol_dollar}{server.port}
  context-path: ${symbol_dollar}{server.servlet.context-path}
  app-name: ${symbol_dollar}{spring.application.name}
  openapi-url: ${symbol_dollar}{springdoc.swagger-ui.path}
  api-doc-url: ${symbol_dollar}{springdoc.api-docs.path}

# Thread pool defaults
thread-pool:
  io-core-size: 4
  io-max-size: 8
  cpu-core-size: 3
  daemon-core-size: 2
  scheduler-pool-size: 2

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# 认证组件
component:
  auth:
    enabled: true
    exclude-paths:
      - /api/auth/**
      - /api/test/**
      - /actuator/**
      - /swagger-ui/**
      - /v3/api-docs/**
